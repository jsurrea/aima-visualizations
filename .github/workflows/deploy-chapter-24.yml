name: Deploy Chapter 24 — Natural Language Processing

on:
  push:
    branches: [main]
    paths: ['chapter-24-nlp/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/deploy-chapter-template.yml
    with:
      chapter-dir: chapter-24-nlp
      chapter-path: chapter-24
    secrets: inherit
