name: Deploy Chapter 26 — Robotics

on:
  push:
    branches: [main]
    paths: ['chapter-26-robotics/**']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/deploy-chapter-template.yml
    with:
      chapter-dir: chapter-26-robotics
      chapter-path: chapter-26
    secrets: inherit
