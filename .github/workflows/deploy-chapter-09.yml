name: Deploy Chapter 09 — Inference in First-Order Logic

on:
  push:
    branches: [main]
    paths: ['chapter-09-inference-fol/**']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/deploy-chapter-template.yml
    with:
      chapter-dir: chapter-09-inference-fol
      chapter-path: chapter-09
    secrets: inherit
