name: Deploy Chapter 15 — Making Simple Decisions

on:
  push:
    branches: [main]
    paths: ['chapter-15-simple-decisions/**']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/deploy-chapter-template.yml
    with:
      chapter-dir: chapter-15-simple-decisions
      chapter-path: chapter-15
    secrets: inherit
