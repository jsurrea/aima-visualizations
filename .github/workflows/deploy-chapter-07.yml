name: Deploy Chapter 07 — Logical Agents

on:
  push:
    branches: [main]
    paths: ['chapter-07-logical-agents/**']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/deploy-chapter-template.yml
    with:
      chapter-dir: chapter-07-logical-agents
      chapter-path: chapter-07
    secrets: inherit
