name: Deploy Chapter 21 — Learning Probabilistic Models

on:
  push:
    branches: [main]
    paths: ['chapter-21-prob-models/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/deploy-chapter-template.yml
    with:
      chapter-dir: chapter-21-prob-models
      chapter-path: chapter-21
    secrets: inherit
