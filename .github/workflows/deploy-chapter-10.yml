name: Deploy Chapter 10 — Knowledge Representation

on:
  push:
    branches: [main]
    paths: ['chapter-10-knowledge-rep/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/deploy-chapter-template.yml
    with:
      chapter-dir: chapter-10-knowledge-rep
      chapter-path: chapter-10
    secrets: inherit
