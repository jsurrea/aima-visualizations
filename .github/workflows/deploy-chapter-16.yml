name: Deploy Chapter 16 — Making Complex Decisions

on:
  push:
    branches: [main]
    paths: ['chapter-16-complex-decisions/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/deploy-chapter-template.yml
    with:
      chapter-dir: chapter-16-complex-decisions
      chapter-path: chapter-16
    secrets: inherit
