name: Deploy Chapter 19 — Learning from Examples

on:
  push:
    branches: [main]
    paths: ['chapter-19-learning/**']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/deploy-chapter-template.yml
    with:
      chapter-dir: chapter-19-learning
      chapter-path: chapter-19
    secrets: inherit
