name: Deploy Chapter 11 — Automated Planning

on:
  push:
    branches: [main]
    paths: ['chapter-11-planning/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/deploy-chapter-template.yml
    with:
      chapter-dir: chapter-11-planning
      chapter-path: chapter-11
    secrets: inherit
