name: Deploy All (Full Site)

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ─── Landing ──────────────────────────────────────────────────────────────
  deploy-landing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: landing/package-lock.json
      - run: npm ci
        working-directory: landing
      - run: npm run build
        working-directory: landing
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: landing/dist
          keep_files: true

  # ─── Chapters ─────────────────────────────────────────────────────────────
  deploy-ch01:
    uses: ./.github/workflows/deploy-chapter-template.yml
    with:
      chapter-dir: chapter-01-introduction
      chapter-path: chapter-01
    secrets: inherit

  deploy-ch02:
    uses: ./.github/workflows/deploy-chapter-template.yml
    with:
      chapter-dir: chapter-02-agents
      chapter-path: chapter-02
    secrets: inherit

