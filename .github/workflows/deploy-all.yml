name: Deploy All (Full Site)

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ─── Build jobs (all run in parallel) ─────────────────────────────────────

  build-landing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: landing/package-lock.json
      - run: npm ci
        working-directory: landing
      - run: npm run build
        working-directory: landing
      - uses: actions/upload-artifact@v4
        with:
          name: landing-dist
          path: landing/dist

  build-ch01:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: chapter-01-introduction/package-lock.json
      - run: npm ci
        working-directory: chapter-01-introduction
      - run: npm test -- --run
        working-directory: chapter-01-introduction
      - run: npm run build
        working-directory: chapter-01-introduction
      - run: cp manifest.json dist/
        working-directory: chapter-01-introduction
      - uses: actions/upload-artifact@v4
        with:
          name: chapter-01-dist
          path: chapter-01-introduction/dist

