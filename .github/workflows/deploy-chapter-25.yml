name: Deploy Chapter 25 — Deep Learning for NLP

on:
  push:
    branches: [main]
    paths: ['chapter-25-deep-nlp/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/deploy-chapter-template.yml
    with:
      chapter-dir: chapter-25-deep-nlp
      chapter-path: chapter-25
    secrets: inherit
