name: Deploy Chapter 14 — Probabilistic Reasoning over Time

on:
  push:
    branches: [main]
    paths: ['chapter-14-temporal-reasoning/**']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/deploy-chapter-template.yml
    with:
      chapter-dir: chapter-14-temporal-reasoning
      chapter-path: chapter-14
    secrets: inherit
