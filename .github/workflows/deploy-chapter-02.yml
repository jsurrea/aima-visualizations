name: Deploy Chapter 02 — Intelligent Agents

on:
  push:
    branches: [main]
    paths: ['chapter-02-agents/**']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/deploy-chapter-template.yml
    with:
      chapter-dir: chapter-02-agents
      chapter-path: chapter-02
    secrets: inherit
