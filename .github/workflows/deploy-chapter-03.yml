name: Deploy Chapter 03 — Solving Problems by Searching

on:
  push:
    branches: [main]
    paths: ['chapter-03-search/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/deploy-chapter-template.yml
    with:
      chapter-dir: chapter-03-search
      chapter-path: chapter-03
    secrets: inherit
