name: Deploy Chapter 08 — First-Order Logic

on:
  push:
    branches: [main]
    paths: ['chapter-08-first-order-logic/**']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/deploy-chapter-template.yml
    with:
      chapter-dir: chapter-08-first-order-logic
      chapter-path: chapter-08
    secrets: inherit
