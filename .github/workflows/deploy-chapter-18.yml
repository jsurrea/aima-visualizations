name: Deploy Chapter 18 — Probabilistic Programming

on:
  push:
    branches: [main]
    paths: ['chapter-18-prob-programming/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/deploy-chapter-template.yml
    with:
      chapter-dir: chapter-18-prob-programming
      chapter-path: chapter-18
    secrets: inherit
