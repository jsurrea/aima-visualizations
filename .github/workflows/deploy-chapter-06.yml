name: Deploy Chapter 06 — Adversarial Search and Games

on:
  push:
    branches: [main]
    paths: ['chapter-06-adversarial/**']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/deploy-chapter-template.yml
    with:
      chapter-dir: chapter-06-adversarial
      chapter-path: chapter-06
    secrets: inherit
